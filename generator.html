<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cetak QR - Screamous Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    /* PERUBAHAN: Lebar maksimal diubah dari 450px menjadi 900px */
    .container-app { max-width: 900px; margin: auto; padding: 30px; background-color: #1e1e1e; border-radius: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); }
    .form-control, .form-select { background-color: #2a2a2a; color: #fff; border: 1px solid #444; }
    
    @media print {
      body { background: white; color: black; padding: 0; }
      .container-app, .no-print { display: none !important; }
      .print-area { display: block !important; }
      .stiker-qr { page-break-inside: avoid; display: inline-block; border: 2px solid black; padding: 15px; margin: 10px; border-radius: 10px; text-align: center; background: white; color: black; width: 180px; }
    }
    .print-area { display: none; }
  </style>
</head>
<body>

  <div class="container container-app">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
      <h4 class="m-0 fw-bold text-warning">🖨️ Cetak Label QR</h4>
      <button class="btn btn-sm btn-outline-danger fw-bold" onclick="window.location.href='index.html'">Kembali</button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Pilih Tipe Kode</label>
        <select id="tipe" class="form-select form-select-lg">
          <option value="KRG">KRG (Karung Transit)</option>
          <option value="DUS">DUS (Karton Box)</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Nomor Awal</label>
        <input type="number" id="no_awal" class="form-control form-control-lg" value="1" min="1">
      </div>
      <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Nomor Akhir</label>
        <input type="number" id="no_akhir" class="form-control form-control-lg" value="5" min="1">
      </div>
    </div>

    <button class="btn btn-warning w-100 fw-bold py-3 text-dark mb-4 shadow" onclick="buatDaftarQR()">📋 GENERATE DAFTAR KODE</button>
    
    <div id="preview-layar" class="row justify-content-center"></div>
    
    <button id="btnPrint" class="btn btn-success w-100 fw-bold py-3 mt-4 shadow" style="display:none;" onclick="window.print()">🖨️ CETAK SEKARANG KEDALAM KERTAS</button>
  </div>

  <div id="area-cetak-printer" class="print-area text-center"></div>

  <script>
    function buatDaftarQR() {
      let tipe = document.getElementById('tipe').value;
      let awal = parseInt(document.getElementById('no_awal').value);
      let akhir = parseInt(document.getElementById('no_akhir').value);
      
      if(awal > akhir) return alert("Nomor awal tidak boleh lebih besar dari nomor akhir!");
      
      let previewBox = document.getElementById('preview-layar');
      let printerBox = document.getElementById('area-cetak-printer');
      
      previewBox.innerHTML = "";
      printerBox.innerHTML = "";
      
      for(let i = awal; i <= akhir; i++) {
        let formatAngka = ("00" + i).slice(-3);
        let teksKode = tipe + "-" + formatAngka;
        
        let divStiker = document.createElement('div');
        divStiker.className = "stiker-qr";
        divStiker.innerHTML = `<div style="font-weight:900; font-size:10px; letter-spacing:2px; margin-bottom:5px; color:black;">SCREAMOUS</div><div id="print_qr_${teksKode}" style="display:inline-block;"></div><div style="font-weight:900; font-size:14px; margin-top:5px; color:black;">${teksKode}</div>`;
        printerBox.appendChild(divStiker);
        
        new QRCode(document.getElementById(`print_qr_${teksKode}`), {
          text: teksKode, width: 110, height: 110, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H
        });

        // PERUBAHAN: Desain kotak preview dibuat lebih fleksibel agar berjejer rapi
        let divPreview = document.createElement('div');
        divPreview.className = "col-auto text-center p-3 border border-secondary rounded m-2 bg-dark shadow-sm";
        divPreview.innerHTML = `<div class="fw-bold text-warning mb-2">${teksKode}</div><div id="prev_qr_${teksKode}" class="p-2 bg-white rounded d-inline-block"></div>`;
        previewBox.appendChild(divPreview);
        
        new QRCode(document.getElementById(`prev_qr_${teksKode}`), {
          text: teksKode, width: 90, height: 90, colorDark: "#000000", colorLight: "#ffffff"
        });
      }
      
      document.getElementById('btnPrint').style.display = "block";
    }
  </script>
</body>
</html>
