<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Packing - Screamous Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script> 
  <style>
    body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container-app { max-width: 450px; margin: auto; padding: 25px; background-color: #1e1e1e; border-radius: 20px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); }
    .form-control, .form-select { background-color: #2a2a2a; color: #fff; border: 1px solid #444; }
    .form-control:focus, .form-select:focus { background-color: #333; color: #fff; border-color: #ffc107; box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25); }
    #reader { width: 100%; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 15px; border: 2px solid #ffc107; }
  </style>
</head>
<body>
  <div class="container container-app">
    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-3">
      <h4 class="m-0 fw-bold text-warning">📦 Modul Packing</h4>
      <button class="btn btn-sm btn-outline-danger fw-bold" onclick="window.location.href='index.html'">Kembali</button>
    </div>

    <div id="reader"></div>

    <form id="formPacking" onsubmit="tampilkanRekap(event)">
      <div class="mb-4">
        <label class="form-label fw-bold text-secondary">ID Kemasan (KRG / DUS)</label>
        <div class="input-group">
          <input type="text" id="id_kemasan" class="form-control form-control-lg border-2 border-warning fw-bold text-uppercase" placeholder="Scan QR..." onchange="verifikasiQRAwal(this.value)" required>
          <button class="btn btn-warning fw-bold px-3 text-dark" type="button" id="btnKamera" onclick="toggleKamera()">📷 Scan</button>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-6">
          <label class="form-label fw-bold text-secondary">Petugas 1</label>
          <input type="text" id="petugas_1" class="form-control" placeholder="Nama" required>
        </div>
        <div class="col-6">
          <label class="form-label fw-bold text-secondary">Petugas 2 (Ops.)</label>
          <input type="text" id="petugas_2" class="form-control" placeholder="Nama">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold text-secondary">Lokasi Simpan</label>
        <select id="lokasi" class="form-select" required>
          <option value="">Sedang memuat data...</option>
        </select>
      </div>

      <div id="area-artikel" class="mt-4 p-3 rounded border border-secondary" style="background-color: #222;">
        <h6 class="fw-bold mb-3 text-info border-bottom border-secondary pb-2">📋 Isi Karung</h6>
        <div class="baris-artikel mb-4 p-3 border border-secondary rounded" style="background-color: #1a1a1a;">
          <label class="form-label text-sm fw-bold text-primary mb-1">1. Kategori:</label>
          <select class="form-select mb-2 input-kategori" onchange="filterModel(this)" required>
            <option value="">Sedang memuat data...</option>
          </select>
          <label class="form-label text-sm fw-bold text-primary mb-1 mt-2">2. Model & Warna:</label>
          <select class="form-select mb-3 input-model" onchange="tampilkanSize(this)" required>
            <option value="">-- Pilih Kategori Dulu --</option>
          </select>
          <div class="area-size" style="display: none;"></div>
        </div>
      </div>

      <button type="button" class="btn btn-outline-info w-100 fw-bold mb-4" onclick="tambahBarisArtikel()">+ Tambah Model Lain</button>
      <button type="submit" id="btnSimpan" class="btn btn-warning w-100 fw-bold py-3 text-dark">💾 SIMPAN DATA</button>
      
      <div id="statusProses" class="text-center text-warning fw-bold mt-3" style="display: none;">
        <div class="spinner-border spinner-border-sm"></div> <span id="pesanProses">Memproses...</span>
      </div>
    </form>
  </div>

  <div id="modalRekap" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#1a1a1a; padding:20px; border-radius:15px; width:90%; max-width:400px; border: 1px solid #444;">
      <h5 class="fw-bold text-center mb-3 text-warning">🔍 Konfirmasi</h5>
      <div id="isiRekap" class="text-light text-start mb-3" style="font-size: 0.95rem;"></div>
      <div class="d-flex gap-2">
        <button class="btn btn-secondary w-50 fw-bold" onclick="tutupModal()">Batal</button>
        <button class="btn btn-warning w-50 fw-bold text-dark" onclick="eksekusiSimpan()">Ya, Simpan!</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxuage-LdjXo4s0mmdbttqSDVldZBCJRngMD-JZ5FgCSn1iO-_TzR_hTHuiTDnRUqNZ/exec";
    
    let daftarArtikel = []; let daftarKategori = []; let payloadSementara = {};
    let html5QrCode; let kameraAktif = false;

    async function tembakAPI(action, payload = null) {
      const response = await fetch(API_URL, {
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: action, payload: payload })
      });
      return await response.json();
    }

    // FUNGSI BARU: Validasi seketika saat Scanner menangkap QR
    async function verifikasiQRAwal(qr) {
      if(!qr) return;
      let btn = document.getElementById('btnSimpan');
      let originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = "Memeriksa QR...";

      try {
        // Memanfaatkan rute cekIsiKarung. Jika hasilnya sukses, berarti karung INI MASIH AKTIF!
        const res = await tembakAPI("cekIsiKarung", qr);
        if(res.sukses) {
          alert("⚠️ DITOLAK!\nQR Code " + qr + " masih AKTIF digunakan di lokasi: " + res.data.lokasi + "\n\nSilakan bongkar (UNPACK) karung tersebut terlebih dahulu jika karung fisik ini sudah kosong dan ingin dipakai ulang.");
          document.getElementById('id_kemasan').value = ""; // Hapus input agar tidak bisa lanjut
        }
      } catch (err) { console.log(err); }

      btn.innerHTML = originalText;
      btn.disabled = false;
    }

    window.onload = async function() {
      try {
        const res = await tembakAPI("getInitialData");
        if(res.sukses) {
          const selLokasi = document.getElementById('lokasi');
          selLokasi.innerHTML = '<option value="">-- Pilih Lokasi --</option>';
          res.data.lokasi.forEach(lok => selLokasi.add(new Option(lok, lok)));
          
          daftarArtikel = res.data.artikel;
          let setKat = new Set();
          daftarArtikel.forEach(art => { if(art.kategori) setKat.add(art.kategori); });
          daftarKategori = Array.from(setKat).sort();
          
          const selKategori = document.querySelector('.input-kategori');
          selKategori.innerHTML = '<option value="">-- Pilih Kategori --</option>';
          daftarKategori.forEach(kat => selKategori.add(new Option(kat, kat)));
        }
      } catch (err) { alert("Gagal memuat data dari server."); }
    };

    function toggleKamera() {
      const readerDiv = document.getElementById('reader');
      const btnKamera = document.getElementById('btnKamera');
      
      if(!kameraAktif) {
        readerDiv.style.display = "block";
        btnKamera.innerHTML = "✖ Tutup"; btnKamera.className = "btn btn-danger fw-bold px-3";
        
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
          { facingMode: "environment" },
          { fps: 15, qrbox: { width: 250, height: 250 } },
          (decodedText) => {
            let qr = decodedText.toUpperCase();
            document.getElementById('id_kemasan').value = qr;
            let audio = new Audio('https://www.soundjay.com/button/beep-07.wav'); audio.play().catch(e=>{});
            toggleKamera(); 
            
            // Panggil Validasi Seketika
            verifikasiQRAwal(qr);
          },
          (errorMessage) => { }
        ).catch(err => alert("Gagal mengakses kamera: " + err));
        kameraAktif = true;
      } else {
        html5QrCode.stop().then(() => {
          readerDiv.style.display = "none";
          btnKamera.innerHTML = "📷 Scan"; btnKamera.className = "btn btn-warning fw-bold px-3 text-dark";
          kameraAktif = false;
        });
      }
    }

    function filterModel(el) {
      const baris = el.closest('.baris-artikel'); const elModel = baris.querySelector('.input-model');
      const areaSize = baris.querySelector('.area-size');
      elModel.innerHTML = '<option value="">-- Pilih Model & Warna --</option>'; areaSize.style.display = 'none';
      if (el.value) {
        const itemSaring = daftarArtikel.filter(a => a.kategori === el.value);
        const unik = new Set(); itemSaring.forEach(a => unik.add(`${a.nama} (${a.warna})`));
        Array.from(unik).sort().forEach(m => elModel.add(new Option(m, m)));
      }
    }

    function tampilkanSize(el) {
      const baris = el.closest('.baris-artikel'); const area = baris.querySelector('.area-size');
      const kat = baris.querySelector('.input-kategori').value;
      area.innerHTML = ''; area.style.display = 'none';
      if(el.value) {
        area.style.display = 'block'; area.innerHTML = '<label class="form-label text-sm fw-bold text-warning mb-2">3. Centang Size:</label>';
        const grid = document.createElement('div'); grid.className = 'row g-2';
        const items = daftarArtikel.filter(a => a.kategori === kat && `${a.nama} (${a.warna})` === el.value);
        items.forEach(i => {
          grid.innerHTML += `<div class="col-4 mb-1"><div class="p-2 border border-secondary rounded text-center bg-dark" onclick="document.getElementById('chk_${i.id}').click()"><input class="form-check-input input-size-cb me-1" type="checkbox" id="chk_${i.id}" data-id="${i.id}" data-nama="${i.nama}" data-warna="${i.warna}" data-size="${i.size}" onclick="event.stopPropagation()"><label class="form-check-label fw-bold text-light" onclick="event.stopPropagation()">${i.size}</label></div></div>`;
        });
        area.appendChild(grid);
      }
    }

    function tambahBarisArtikel() {
      const area = document.getElementById('area-artikel'); const clone = area.querySelector('.baris-artikel').cloneNode(true);
      clone.querySelector('.input-kategori').value = ""; clone.querySelector('.input-model').innerHTML = '<option value="">-- Pilih --</option>';
      clone.querySelector('.area-size').innerHTML = ''; clone.querySelector('.area-size').style.display = 'none';
      area.appendChild(clone);
    }

    function tampilkanRekap(e) {
      e.preventDefault();
      let idKrg = document.getElementById('id_kemasan').value.toUpperCase().trim();
      let p1 = document.getElementById('petugas_1').value; let p2 = document.getElementById('petugas_2').value;
      let lok = document.getElementById('lokasi').value;
      let list = []; let htmlList = `<ul>`;
      document.querySelectorAll('.input-size-cb:checked').forEach(cb => {
        list.push({ idArtikel: cb.getAttribute('data-id'), qty: "-" });
        htmlList += `<li>${cb.getAttribute('data-nama')} (${cb.getAttribute('data-warna')}) - <b class="text-danger">Size ${cb.getAttribute('data-size')}</b></li>`;
      });
      htmlList += `</ul>`;
      
      if(list.length === 0) return alert("Pilih minimal 1 ukuran!");
      
      payloadSementara = { idKemasan: idKrg, petugas1: p1, petugas2: p2, lokasi: lok, listArtikel: list };
      document.getElementById('isiRekap').innerHTML = `<p><b>ID:</b> <span class="text-warning">${idKrg}</span><br><b>Lokasi:</b> ${lok}</p><div class="bg-dark p-2 rounded">${htmlList}</div>`;
      document.getElementById('modalRekap').style.display = 'flex';
    }

    function tutupModal() { document.getElementById('modalRekap').style.display = 'none'; }

    async function eksekusiSimpan() {
      tutupModal();
      document.getElementById('btnSimpan').style.display = 'none';
      document.getElementById('statusProses').style.display = 'block'; document.getElementById('pesanProses').innerText = "Menyimpan ke Database...";

      try {
        const res = await tembakAPI("simpanPacking", payloadSementara);
        if(res.sukses) {
          alert(res.pesan);
          window.location.reload(); 
        } else {
          // Tangkap pesan GAGAL dari Validasi Backend
          alert(res.pesan);
        }
      } catch (err) { alert("Gagal menghubungi server Google Sheets."); }
      
      document.getElementById('btnSimpan').style.display = 'block';
      document.getElementById('statusProses').style.display = 'none';
    }
  </script>
</body>
</html>
