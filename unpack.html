<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unpack - Screamous Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .card { background-color: #1a1a1a; }
    .form-control { background-color: #2a2a2a; color: #fff; border: 1px solid #444; }
    .form-control:focus { background-color: #333; color: #fff; border-color: #ffc107; box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25); }
    #readerUnpack { width: 100%; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 15px; border: 2px solid #ffc107; }
  </style>
</head>
<body>
  <div class="container-fluid px-0" style="max-width: 95%; margin: auto;">
    <div class="row g-4">
      
      <div class="col-12 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 p-4">
          <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-3">
            <h4 class="m-0 fw-bold text-warning">📤 Modul Unpack</h4>
            <button class="btn btn-sm btn-outline-danger fw-bold" onclick="window.location.href='index.html'">Kembali</button>
          </div>

          <div id="readerUnpack"></div>

          <form id="formUnpack" onsubmit="prosesCekBongkar(event)">
            <div class="mb-4 mt-2">
              <label class="form-label fw-bold text-secondary">ID Kemasan (KRG / DUS)</label>
              <div class="input-group">
                <input type="text" id="id_kemasan_unpack" class="form-control form-control-lg border-2 border-warning fw-bold text-uppercase" placeholder="Scan QR / Ketik..." required>
                <button class="btn btn-warning fw-bold px-3 text-dark" type="button" id="btnKameraUnpack" onclick="toggleKameraUnpack()">📷 Scan</button>
              </div>
            </div>

            <div class="row mb-4">
              <div class="col-6">
                <label class="form-label fw-bold text-secondary">Petugas Bongkar 1</label>
                <input type="text" id="bongkar_1" class="form-control" placeholder="Nama" required>
              </div>
              <div class="col-6">
                <label class="form-label fw-bold text-secondary">Petugas 2 (Ops.)</label>
                <input type="text" id="bongkar_2" class="form-control" placeholder="Nama">
              </div>
            </div>

            <button type="submit" id="btnCekBongkar" class="btn btn-warning w-100 fw-bold py-3 text-dark shadow-sm rounded-3">
              🔍 Validasi & Cek Isi Karung
            </button>
          </form>

          <div id="areaIsiKarung" class="mt-4" style="display: none;">
            <div class="alert border-0 shadow-sm rounded-3" style="background-color: #2a2a2a; border-left: 5px solid #ffc107 !important;">
              <h6 class="fw-bold m-0 text-warning">📋 Isi Kemasan Ditemukan:</h6>
              <hr class="my-2 border-secondary">
              <div id="daftarArtikelUnpack" style="font-size: 0.95rem;"></div>
            </div>
            <button type="button" class="btn btn-danger w-100 fw-bold py-3 shadow" onclick="konfirmasiBongkarMutakhir()">
              💥 Eksekusi Bongkar Sekarang
            </button>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-7">
        <div class="card border-0 shadow-lg rounded-4 p-4 h-100">
          <h5 class="fw-bold text-info mb-2">🔍 Asisten Cari Stok Aktif</h5>
          <p class="text-secondary small mb-3">Lacak lokasi artikel yang masih tersimpan di dalam karung transit.</p>
          
          <div class="mb-3">
            <input type="text" id="searchArtikelInput" class="form-control form-control-lg border-2 border-info shadow-sm" placeholder="Ketik Nama Artikel / Warna / Size..." onkeyup="filterAsistenArtikel()">
          </div>

          <div class="table-responsive rounded border border-secondary shadow-sm" style="max-height: 55vh; overflow-y: auto;">
            <table class="table table-dark table-hover table-striped align-middle text-center mb-0" style="font-size: 0.9rem;">
              <thead style="background-color: #0dcaf0; color: #000; position: sticky; top: 0; z-index: 5;">
                <tr>
                  <th class="py-2">Artikel</th>
                  <th class="py-2">Size</th>
                  <th class="py-2">Qty</th>
                  <th class="py-2">ID Karung</th>
                  <th class="py-2">Lokasi</th>
                  <th class="py-2">Aksi</th>
                </tr>
              </thead>
              <tbody id="asistenTableBody">
                <tr><td colspan="6" class="py-4 text-secondary">Menganalisis stok aktif di gudang...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // URL API RAHASIA ANDA (Sama persis dengan Modul Packing)
    const API_URL = "https://script.google.com/macros/s/AKfycbxuage-LdjXo4s0mmdbttqSDVldZBCJRngMD-JZ5FgCSn1iO-_TzR_hTHuiTDnRUqNZ/exec";
    
    let inventoryGlobal = [];
    let detailKarungAktif = null; 
    let html5QrCode; let kameraAktif = false;

    // Fungsi Mengirim Request ke Google Sheets API
    async function tembakAPI(action, payload = null) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: action, payload: payload })
      });
      return await response.json();
    }

    // Memuat Data Asisten Secara Otomatis Saat Halaman Dibuka
    window.onload = async function() {
      try {
        const res = await tembakAPI("getAsistenData");
        if(res.sukses) {
          inventoryGlobal = res.data; 
          renderAsistenTable(res.data);
        }
      } catch (err) {
        document.getElementById('asistenTableBody').innerHTML = '<tr><td colspan="6" class="py-4 text-danger">Gagal memuat data dari server.</td></tr>';
      }
    };

    // Mesin Kamera Live Scanner untuk Unpack
    function toggleKameraUnpack() {
      const readerDiv = document.getElementById('readerUnpack');
      const btnKamera = document.getElementById('btnKameraUnpack');
      
      if(!kameraAktif) {
        readerDiv.style.display = "block";
        btnKamera.innerHTML = "✖ Tutup"; btnKamera.className = "btn btn-danger fw-bold px-3";
        
        html5QrCode = new Html5Qrcode("readerUnpack");
        html5QrCode.start(
          { facingMode: "environment" },
          { fps: 15, qrbox: { width: 250, height: 250 } },
          (decodedText) => {
            // Jika berhasil terbaca
            document.getElementById('id_kemasan_unpack').value = decodedText.toUpperCase();
            let audio = new Audio('https://www.soundjay.com/button/beep-07.wav'); audio.play().catch(e=>{});
            toggleKameraUnpack(); // Matikan kamera
            
            // Memicu pencarian database secara otomatis
            document.getElementById('btnCekBongkar').click();
          },
          (errorMessage) => { /* Abaikan error frame */ }
        ).catch(err => alert("Gagal mengakses kamera: " + err));
        kameraAktif = true;
      } else {
        html5QrCode.stop().then(() => {
          readerDiv.style.display = "none";
          btnKamera.innerHTML = "📷 Scan"; btnKamera.className = "btn btn-warning fw-bold px-3 text-dark";
          kameraAktif = false;
        });
      }
    }

    // Render Tabel Pencarian (Asisten)
    function renderAsistenTable(data) {
      let html = '';
      if (!data || data.length === 0) {
        html = '<tr><td colspan="6" class="text-secondary py-4 fw-bold">Semua karung transit sudah kosong.</td></tr>';
      } else {
        data.forEach(row => {
          html += `
            <tr>
              <td class="text-start fw-bold text-light">${row.namaArtikel} <span class="text-secondary small d-block">${row.warna}</span></td>
              <td class="fw-bold text-danger">${row.size}</td>
              <td class="fw-bold">${row.qty} Pcs</td>
              <td><span class="badge bg-warning text-dark">${row.idKemasan}</span></td>
              <td class="fw-bold text-info">${row.lokasi}</td>
              <td>
                <button type="button" class="btn btn-sm btn-outline-info fw-bold py-1 px-2" onclick="pilihKarungOtomatis('${row.idKemasan}')">🎯 Pilih</button>
              </td>
            </tr>`;
        });
      }
      document.getElementById('asistenTableBody').innerHTML = html;
    }

    // Filter Asisten
    function filterAsistenArtikel() {
      let keyword = document.getElementById('searchArtikelInput').value.toLowerCase();
      let filtered = inventoryGlobal.filter(row => {
        return String(row.namaArtikel).toLowerCase().includes(keyword) || String(row.warna).toLowerCase().includes(keyword) || String(row.size).toLowerCase().includes(keyword) || String(row.idKemasan).toLowerCase().includes(keyword) || String(row.lokasi).toLowerCase().includes(keyword);
      });
      renderAsistenTable(filtered);
    }

    // Pilih Otomatis dari Tabel
    function pilihKarungOtomatis(idKemasan) {
      document.getElementById('id_kemasan_unpack').value = idKemasan;
      document.getElementById('btnCekBongkar').click();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // Proses Cek ke Database (API)
    async function prosesCekBongkar(event) {
      if(event) event.preventDefault();
      let idTarget = document.getElementById('id_kemasan_unpack').value.toUpperCase().trim();
      if(!idTarget) return;

      let btn = document.getElementById('btnCekBongkar');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Memverifikasi...';
      
      try {
        const res = await tembakAPI("cekIsiKarung", idTarget);
        
        btn.disabled = false;
        btn.innerHTML = '🔍 Validasi & Cek Isi Karung';
        
        if(!res.sukses) { 
          alert(res.pesan); 
          document.getElementById('areaIsiKarung').style.display = 'none'; 
          return; 
        }
        
        detailKarungAktif = res.data;
        let htmlArtikel = '<ul class="list-group list-group-flush rounded border border-secondary text-light bg-dark">';
        res.data.listArtikel.forEach(art => {
          htmlArtikel += `<li class="list-group-item d-flex justify-content-between align-items-center bg-transparent py-2 text-light border-secondary">
            <div><b>${art.nama}</b> <span class="text-secondary d-block small">${art.warna} (Size <b class="text-danger">${art.size}</b>)</span></div>
          </li>`;
        });
        htmlArtikel += '</ul>';
        
        document.getElementById('daftarArtikelUnpack').innerHTML = htmlArtikel;
        document.getElementById('areaIsiKarung').style.display = 'block';
      } catch (err) {
        alert("Gagal terhubung ke server Google Sheets.");
        btn.disabled = false;
        btn.innerHTML = '🔍 Validasi & Cek Isi Karung';
      }
    }

    // Eksekusi Simpan Unpack (API)
    async function konfirmasiBongkarMutakhir() {
      let p1 = document.getElementById('bongkar_1').value.trim();
      let p2 = document.getElementById('bongkar_2').value.trim();
      if(!p1) return alert("Nama Petugas Bongkar 1 wajib diisi!");
      
      let tanya = confirm(`PERINGATAN BONGKAR STOCK!\nApakah Anda yakin ingin membongkar ${detailKarungAktif.idKemasan} dari ${detailKarungAktif.lokasi}?`);
      
      if(tanya) {
        document.getElementById('areaIsiKarung').style.display = 'none';
        let btn = document.getElementById('btnCekBongkar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Mengosongkan Karung...';
        
        let payload = { idUnique: detailKarungAktif.idUnique, idKemasan: detailKarungAktif.idKemasan, petugasBongkar1: p1, petugasBongkar2: p2 };
        
        try {
          const res = await tembakAPI("simpanUnpack", payload);
          alert("Sukses! " + res.pesan);
          window.location.reload(); // Refresh setelah berhasil bongkar
        } catch(err) {
          alert("Gagal memproses ke server.");
          btn.disabled = false;
          btn.innerHTML = '🔍 Validasi & Cek Isi Karung';
        }
      }
    }
  </script>
</body>
</html>
