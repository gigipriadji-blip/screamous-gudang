<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV View - Screamous Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .card-stat { background-color: #1a1a1a; border: 1px solid #444; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .table-dark { background-color: transparent; }
    .table-dark th { color: #ffc107; border-bottom: 2px solid #444; padding-bottom: 15px; }
    .table-dark td { border-bottom: 1px solid #333; padding: 12px 5px; color: #ccc; }
    .text-warning { color: #ffc107 !important; }
    .text-info { color: #0dcaf0 !important; }
    .text-success { color: #198754 !important; }
    .text-danger { color: #dc3545 !important; }
    
    /* Animasi Loading TV */
    .tv-loading { text-align: center; margin-top: 15vh; color: #ffc107; }
  </style>
</head>
<body>
  <div class="container-fluid" id="app-content">
    
    <div class="d-flex justify-content-between align-items-end mb-4 border-bottom border-secondary pb-3">
      <div>
        <h2 class="fw-bold m-0 text-warning" id="judul-tv">📊 LIVE BACKUP INVENTORY</h2>
        <div id="waktuRealtime" class="mt-1" style="font-size: 1.1rem;">Memuat jam...</div>
      </div>
      <div class="text-end">
        <div id="waktuUpdate" class="text-info small mb-2 fw-bold">🔄 Sinkronisasi: --:--:--</div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-warning fw-bold" onclick="toggleView()">🔄 Tukar View</button>
          <button class="btn btn-sm btn-outline-light fw-bold" onclick="toggleFullScreen()">📺 Fullscreen</button>
          <button class="btn btn-sm btn-danger fw-bold" onclick="window.location.href='index.html'">✖ Tutup</button>
        </div>
      </div>
    </div>

    <div id="area-dashboard">
      <div class="tv-loading">
        <div class="spinner-border" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4 class="mt-3 fw-bold">Menghubungkan ke Server Database...</h4>
      </div>
    </div>

  </div>

  <script>
    // URL API RAHASIA
    const API_URL = "https://script.google.com/macros/s/AKfycbxuage-LdjXo4s0mmdbttqSDVldZBCJRngMD-JZ5FgCSn1iO-_TzR_hTHuiTDnRUqNZ/exec";
    
    let currentMode = "lokasi";
    let dataTerakhir = null;

    // Menjalankan Jam Realtime
    setInterval(() => {
      let now = new Date();
      let hariArr = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
      let tgl = ("0" + now.getDate()).slice(-2) + "/" + ("0" + (now.getMonth()+1)).slice(-2) + "/" + now.getFullYear();
      let jam = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2) + ":" + ("0" + now.getSeconds()).slice(-2);
      document.getElementById('waktuRealtime').innerHTML = `<span class="text-secondary">${hariArr[now.getDay()]}, ${tgl}</span> &nbsp;<b class="text-white fs-4">${jam}</b>`;
    }, 1000);

    // Fungsi Fullscreen
    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => alert(`Error: ${err.message}`));
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    }

    // Fungsi Tukar View (Sesuai kode asli Anda)
    function toggleView() {
      currentMode = (currentMode === "lokasi") ? "artikel" : "lokasi";
      document.getElementById("judul-tv").innerHTML = (currentMode === "lokasi") ? "🏢 LIVE INVENTORY: LOKASI GUDANG" : "📊 LIVE BACKUP INVENTORY";
      if(dataTerakhir) renderDashboard(dataTerakhir);
    }

    // Menarik Data dari API Github
    async function muatDashboard() {
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "getDashboardData", payload: null })
        });
        
        // Peringatan jika Google memblokir karena limit / error server
        if (!response.ok) {
          throw new Error("Server Google Sibuk / Error");
        }

        const res = await response.json();
        
        if(res.sukses) {
          dataTerakhir = res.data;
          document.getElementById('area-dashboard').innerHTML = ""; // Bersihkan loading
          renderDashboard(res.data);
          let now = new Date();
          document.getElementById('waktuUpdate').innerHTML = `🔄 Sinkronisasi: ${("0"+now.getHours()).slice(-2)}:${("0"+now.getMinutes()).slice(-2)}:${("0"+now.getSeconds()).slice(-2)}`;
        } else {
          document.getElementById('waktuUpdate').innerHTML = `<span class="text-danger">Gagal: ${res.pesan}</span>`;
        }
      } catch (err) {
        console.error("Detail Error:", err);
        document.getElementById('waktuUpdate').innerHTML = `<span class="text-danger">Koneksi Putus (Refresh)</span>`;
      }
    }

    // Render HTML TV View (Sesuai kode asli)
    function renderDashboard(data) {
      const area = document.getElementById('area-dashboard');
      if(data && data.errorBackend) {
        area.innerHTML = `<div class="text-center mt-5"><h2 class="text-danger">ERROR DATABASE</h2><p class="text-light">${data.errorBackend}</p></div>`;
        return;
      }

      let html = '';
      if (currentMode === "artikel") {
        html += `
          <div class="row text-center mb-4 g-3">
            <div class="col-4"><div class="card-stat"><div class="text-secondary small fw-bold mb-1">TOTAL MODEL TERSIMPAN</div><h3 class="m-0"><b class="text-warning">${data.ringkasan.totalModel}</b> <span class="fs-6 text-light">Model Unik</span></h3></div></div>
            <div class="col-4"><div class="card-stat"><div class="text-secondary small fw-bold mb-1">TOTAL LOKASI TERPAKAI</div><h3 class="m-0"><b class="text-info">${data.ringkasan.totalLokasi}</b> <span class="fs-6 text-light">Ruangan</span></h3></div></div>
            <div class="col-4"><div class="card-stat"><div class="text-secondary small fw-bold mb-1">TOTAL VOLUME KEMASAN</div><h3 class="m-0"><b class="text-success">${data.ringkasan.totalKemasan}</b> <span class="fs-6 text-light">Karung / Dus</span></h3></div></div>
          </div>
          <table class="table table-dark table-borderless align-middle fw-bold">
            <thead><tr><th>Nama Artikel</th><th>Size Tersedia</th><th>Sebaran Gudang</th><th>Total Tersimpan</th><th>Waktu Packing Terakhir</th></tr></thead>
            <tbody>`;
        
        data.dataArtikel.forEach(art => {
          let listSize = Array.from(art.sizes).join(", ");
          let listLokasi = Array.from(art.lokasi).join(", ");
          html += `<tr>
            <td class="text-light">${art.nama} <span class="text-secondary small">(${art.warna})</span></td>
            <td class="text-danger">${listSize}</td>
            <td class="text-info">${listLokasi}</td>
            <td class="text-success">${art.qty} <span class="small text-secondary">KRG</span></td>
            <td class="text-secondary small">${art.waktuUpdate}</td>
          </tr>`;
        });
        html += `</tbody></table>`;
      } else {
        html += `<div class="row g-4">`;
        Object.keys(data.dataLokasi).sort().forEach(lok => {
          let item = data.dataLokasi[lok];
          html += `<div class="col-12 col-md-6 col-lg-4">
            <div class="card-stat h-100">
              <h5 class="fw-bold text-info mb-3 border-bottom border-secondary pb-2">📍 ${lok} <span class="float-end badge bg-dark text-warning border border-warning">${item.totalKemasan} KRG</span></h5>
              <div class="small" style="max-height: 250px; overflow-y: auto;">`;
          item.listKemasan.forEach(k => {
             html += `<div class="mb-2 pb-2 border-bottom border-dark">
               <b class="text-light">${k.id}</b> <span class="text-secondary">(${k.waktu})</span><br>
               <span class="text-danger">${k.isi.join(", ")}</span>
             </div>`;
          });
          html += `</div></div></div>`;
        });
        html += `</div>`;
      }
      area.innerHTML = html;
    }

    // Mulai Eksekusi
    muatDashboard();
    
    // UBAH INTERVAL MENJADI 15 DETIK AGAR TIDAK DIBLOKIR GOOGLE (15000 ms)
    setInterval(muatDashboard, 15000);
  </script>
</body>
</html>
